<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Left: side panel mockup (result step) -->
  <g transform="translate(90,60)">
    <rect width="420" height="680" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="24" y="42" font-size="16" font-weight="bold" fill="#0f172a">Career Copilot</text>
    <line x1="0" y1="64" x2="420" y2="64" stroke="#e2e8f0" stroke-width="2"/>
    <text x="24" y="98" font-size="14" font-weight="bold" fill="#475569">← New</text>

    <!-- draft -->
    <rect x="20" y="116" width="380" height="360" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <g font-size="12.5" fill="#1e293b">
      <text x="36" y="146">Dear Firecrawl team,</text>
      <text x="36" y="176">Scaling a crawler to billions of requests is the</text>
      <text x="36" y="194">kind of problem I've spent the last four years</text>
      <text x="36" y="212">on. At Acme, I rebuilt the ingestion pipeline</text>
      <text x="36" y="230">that processed 2B events a day, cutting infra</text>
      <text x="36" y="248">spend 40% while tripling throughput — work</text>
      <text x="36" y="266">that maps directly to the crawling infrastructure</text>
      <text x="36" y="284">this role owns.</text>
    </g>
    <rect x="36" y="304" width="348" height="9" rx="4" fill="#e2e8f0"/>
    <rect x="36" y="322" width="330" height="9" rx="4" fill="#e2e8f0"/>
    <rect x="36" y="340" width="344" height="9" rx="4" fill="#e2e8f0"/>
    <rect x="36" y="358" width="290" height="9" rx="4" fill="#e2e8f0"/>
    <rect x="36" y="384" width="348" height="9" rx="4" fill="#e2e8f0"/>
    <rect x="36" y="402" width="336" height="9" rx="4" fill="#e2e8f0"/>
    <rect x="36" y="420" width="180" height="9" rx="4" fill="#e2e8f0"/>
    <text x="36" y="460" font-size="12.5" fill="#1e293b">— Austin</text>

    <rect x="20" y="492" width="90" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="65" y="515" font-size="13" font-weight="bold" fill="#334155" text-anchor="middle">Copy</text>

    <!-- reprompt box -->
    <rect x="20" y="544" width="380" height="116" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="36" y="570" font-size="11" font-weight="bold" fill="#64748b">REPROMPT OR ADD CONTEXT, THEN REGENERATE</text>
    <rect x="36" y="582" width="348" height="34" rx="7" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="48" y="604" font-size="12" fill="#0f172a">I also led the payments migration — mention it</text>
    <rect x="36" y="624" width="120" height="26" rx="7" fill="#0f172a"/>
    <text x="96" y="641" font-size="11.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Regenerate</text>
  </g>

  <!-- Right: headline -->
  <g transform="translate(600,240)">
    <text y="0" font-size="44" font-weight="bold" fill="#0f172a">Refine it like a conversation</text>
    <text y="64" font-size="21" fill="#475569">Reprompt with steering or new context and regenerate.</text>
    <text y="94" font-size="21" fill="#475569">Save what you add — future drafts get smarter.</text>
    <g transform="translate(0,150)" font-size="19" fill="#334155">
      <circle cx="8" cy="-6" r="4" fill="#6366f1"/>
      <text x="26">If it can't ground a claim, it asks you instead of inventing</text>
      <circle cx="8" cy="34" r="4" fill="#6366f1"/>
      <text x="26" y="40">Your answers are remembered — it never asks twice</text>
      <circle cx="8" cy="74" r="4" fill="#6366f1"/>
      <text x="26" y="80">Edit the draft in place, copy, paste into the application</text>
    </g>
  </g>
</svg>
