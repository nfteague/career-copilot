<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Left: headline -->
  <g transform="translate(90,220)">
    <text y="0" font-size="46" font-weight="bold" fill="#0f172a">A resume tailored to the</text>
    <text y="54" font-size="46" font-weight="bold" fill="#0f172a">company, not the job title</text>
    <text y="118" font-size="21" fill="#475569">It reads the posting, finds your strongest evidence,</text>
    <text y="148" font-size="21" fill="#475569">and leads with it.</text>
    <g transform="translate(0,204)" font-size="19" fill="#334155">
      <circle cx="8" cy="-6" r="4" fill="#6366f1"/>
      <text x="26">Mirrors the posting's exact keywords in your skills</text>
      <circle cx="8" cy="34" r="4" fill="#6366f1"/>
      <text x="26" y="40">Flags the asks your profile doesn't show — you fill them in</text>
      <circle cx="8" cy="74" r="4" fill="#6366f1"/>
      <text x="26" y="80">One page, print-ready, styled like your own resume</text>
    </g>
  </g>

  <!-- Right: side panel mockup (resume view) -->
  <g transform="translate(770,60)">
    <rect width="420" height="680" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="24" y="42" font-size="16" font-weight="bold" fill="#0f172a">Career Copilot</text>
    <line x1="0" y1="64" x2="420" y2="64" stroke="#e2e8f0" stroke-width="2"/>

    <!-- title row -->
    <text x="24" y="100" font-size="15" font-weight="bold" fill="#0f172a">Tailored resume</text>
    <text x="24" y="119" font-size="11" fill="#64748b">Forward Deployed Engineer · Voxlane AI</text>
    <rect x="292" y="80" width="104" height="30" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="344" y="99" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">Open resume</text>

    <!-- sections -->
    <text x="24" y="156" font-size="11" font-weight="bold" fill="#94a3b8" letter-spacing="1">SECTIONS</text>
    <g>
      <rect x="24" y="168" width="14" height="14" rx="3" fill="#0f172a"/>
      <path d="M27 175 l3 3 l5 -6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="180" font-size="13" fill="#334155">Summary</text>

      <rect x="24" y="196" width="14" height="14" rx="3" fill="#0f172a"/>
      <path d="M27 203 l3 3 l5 -6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="208" font-size="13" fill="#334155">Experience</text>

      <rect x="48" y="222" width="13" height="13" rx="3" fill="#0f172a"/>
      <path d="M50.5 228.5 l3 3 l4.5 -5.5" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="70" y="233" font-size="12.5" fill="#475569">Solutions Engineer — Northbeam</text>

      <rect x="48" y="248" width="13" height="13" rx="3" fill="#0f172a"/>
      <path d="M50.5 254.5 l3 3 l4.5 -5.5" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="70" y="259" font-size="12.5" fill="#475569">Co-Founder — Loopcast</text>

      <rect x="24" y="276" width="14" height="14" rx="3" fill="#0f172a"/>
      <path d="M27 283 l3 3 l5 -6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="288" font-size="13" fill="#334155">Projects</text>

      <rect x="48" y="302" width="13" height="13" rx="3" fill="#0f172a"/>
      <path d="M50.5 308.5 l3 3 l4.5 -5.5" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="70" y="313" font-size="12.5" fill="#475569">Streamcast — real-time audio AI</text>

      <rect x="24" y="330" width="14" height="14" rx="3" fill="#0f172a"/>
      <path d="M27 337 l3 3 l5 -6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="342" font-size="13" fill="#334155">Skills</text>
    </g>

    <!-- gaps -->
    <rect x="20" y="366" width="380" height="140" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
    <text x="36" y="390" font-size="10.5" font-weight="bold" fill="#92400e" letter-spacing="0.5">THE JOB ASKS FOR THESE —</text>
    <text x="36" y="404" font-size="10.5" font-weight="bold" fill="#92400e" letter-spacing="0.5">YOUR PROFILE DOESN'T SHOW THEM</text>
    <text x="36" y="430" font-size="13" fill="#334155">Node.js</text>
    <text x="384" y="430" font-size="11.5" font-weight="bold" fill="#64748b" text-anchor="end" text-decoration="underline">+ I have this</text>
    <text x="36" y="456" font-size="13" fill="#334155">Kubernetes</text>
    <text x="384" y="456" font-size="11.5" font-weight="bold" fill="#64748b" text-anchor="end" text-decoration="underline">+ I have this</text>
    <text x="36" y="482" font-size="10.5" fill="#92400e">Screeners check for these — if one is true for you, add it.</text>

    <!-- revise box -->
    <text x="24" y="530" font-size="11" font-weight="bold" fill="#94a3b8" letter-spacing="1">REVISE WITH AI</text>
    <rect x="20" y="542" width="380" height="56" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="36" y="568" font-size="12.5" fill="#0f172a">Lead with the real-time audio project</text>
    <rect x="20" y="612" width="380" height="36" rx="8" fill="#0f172a"/>
    <text x="210" y="635" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Revise resume</text>
  </g>
</svg>
