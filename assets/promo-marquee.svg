    <text x="228" y="34" font-size="10.5" fill="#64748b">Profile</text>
    <text x="275" y="34" font-size="10.5" fill="#64748b">Settings</text>
    <line x1="0" y1="52" x2="340" y2="52" stroke="#e2e8f0" stroke-width="1.5"/>

    <rect x="16" y="68" width="308" height="150" rx="9" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="30" y="92" font-size="9.5" font-weight="bold" fill="#94a3b8" letter-spacing="1">TARGET ROLE</text>
    <rect x="30" y="102" width="138" height="28" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="40" y="120" font-size="11" fill="#0f172a">Firecrawl</text>
    <rect x="176" y="102" width="138" height="28" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="186" y="120" font-size="11" fill="#0f172a">Senior Backend Eng.</text>
    <rect x="30" y="140" width="284" height="64" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="42" y="152" width="252" height="7" rx="3.5" fill="#e2e8f0"/>
    <rect x="42" y="167" width="238" height="7" rx="3.5" fill="#e2e8f0"/>
    <rect x="42" y="182" width="248" height="7" rx="3.5" fill="#e2e8f0"/>

    <rect x="16" y="234" width="308" height="34" rx="8" fill="#f1f5f9"/>
    <rect x="21" y="239" width="149" height="24" rx="6" fill="#ffffff"/>
    <text x="95" y="255" font-size="11" font-weight="bold" fill="#0f172a" text-anchor="middle">Cover letter</text>
    <text x="247" y="255" font-size="11" fill="#64748b" text-anchor="middle">Answer a question</text>

    <text x="16" y="298" font-size="11" font-weight="bold" fill="#0f172a">Tone</text>
    <rect x="16" y="306" width="149" height="30" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="27" y="325" font-size="11" fill="#0f172a">Professional</text>
    <text x="175" y="298" font-size="11" font-weight="bold" fill="#0f172a">Length</text>
    <rect x="175" y="306" width="149" height="30" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="186" y="325" font-size="11" fill="#0f172a">Standard</text>

    <rect x="16" y="356" width="308" height="38" rx="8" fill="#0f172a"/>
    <text x="170" y="380" font-size="12.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Generate cover letter</text>
